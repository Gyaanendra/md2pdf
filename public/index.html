<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown → PDF</title>

  <!-- GitHub Markdown CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown-light.min.css">

  <!-- PrismJS Theme (Tomorrow Night for dark code blocks) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">

  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Title Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>Export PDF</h3>
      <label for="pdf-title">Document Title</label>
      <input type="text" id="pdf-title" placeholder="My Document" autofocus>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
        <button id="modal-confirm" class="btn btn-primary">Generate PDF</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>Markdown → PDF</span>
    </div>
    <div class="header-actions">
      <button id="btn-sample" class="btn btn-ghost">Sample</button>
      <button id="btn-clear" class="btn btn-ghost">Clear</button>
      <button id="btn-download" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF
      </button>
    </div>
  </header>

  <!-- Split View -->
  <div class="container">
    <div class="pane editor-pane">
      <div class="pane-header">
        <span>Markdown</span>
        <span class="line-count" id="line-count">0 lines</span>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="Paste or type your markdown here..."></textarea>
    </div>
    <div class="gutter" id="gutter"></div>
    <div class="pane preview-pane">
      <div class="pane-header">
        <span>Preview</span>
      </div>
      <div class="preview-scroll">
        <div id="preview" class="markdown-body"></div>
      </div>
    </div>
  </div>

  <!-- Libs (loaded in order) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>

  <script src="app.js"></script>
</body>
</html>
