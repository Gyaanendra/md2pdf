<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>md2pdf — Markdown to PDF</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown-light.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- PDF Export Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>Export PDF</h3>
      <label for="pdf-title">Document Title</label>
      <input type="text" id="pdf-title" placeholder="My Document" autofocus>
      <div class="modal-row">
        <div class="modal-field">
          <label for="pdf-size">Page Size</label>
          <select id="pdf-size">
            <option value="A4" selected>A4</option>
            <option value="Letter">Letter</option>
            <option value="Legal">Legal</option>
            <option value="A3">A3</option>
            <option value="A5">A5</option>
          </select>
        </div>
        <div class="modal-field">
          <label for="pdf-orientation">Orientation</label>
          <select id="pdf-orientation">
            <option value="portrait" selected>Portrait</option>
            <option value="landscape">Landscape</option>
          </select>
        </div>
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label for="pdf-margin">Margins</label>
          <select id="pdf-margin">
            <option value="normal" selected>Normal (22mm)</option>
            <option value="narrow">Narrow (12mm)</option>
            <option value="wide">Wide (30mm)</option>
          </select>
        </div>
        <div class="modal-field">
          <label class="checkbox-label">
            <input type="checkbox" id="pdf-toc" checked>
            Auto Table of Contents
          </label>
        </div>
      </div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
        <button id="modal-confirm" class="btn btn-primary">Generate PDF</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>md2pdf</span>
      <span class="version-badge">v1.00.01</span>
    </div>
    <div class="header-actions">
      <span class="made-by">Made by <a href="https://github.com/Gyaanendra" target="_blank" rel="noopener">Gyaanendra</a></span>
      <a href="https://github.com/Gyaanendra/md2pdf" target="_blank" rel="noopener" class="btn btn-ghost btn-icon" title="GitHub Repo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      </a>
      <a href="https://gyanendra.vihar.in" target="_blank" rel="noopener" class="btn btn-ghost btn-icon" title="Portfolio">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </a>
      <span class="separator">|</span>
      <button id="btn-sample" class="btn btn-ghost">Sample</button>
      <button id="btn-clear" class="btn btn-ghost">Clear</button>
      <button id="btn-download" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        PDF
      </button>
    </div>
  </header>

  <!-- Split View -->
  <div class="container">
    <div class="pane editor-pane">
      <div class="pane-header">
        <span>Markdown</span>
        <span class="editor-meta">
          <span id="line-count">0 lines</span>
          <span class="meta-sep">·</span>
          <span id="word-count">0 words</span>
          <span class="meta-sep">·</span>
          <span id="cursor-pos">Ln 1, Col 1</span>
        </span>
      </div>
      <div class="editor-wrap">
        <div class="line-numbers" id="line-numbers">1</div>
        <textarea id="editor" spellcheck="false" placeholder="Paste or type your markdown here..."></textarea>
      </div>
      <div id="drop-zone" class="drop-zone hidden">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>Drop image here</span>
      </div>
    </div>
    <div class="gutter" id="gutter"></div>
    <div class="pane preview-pane">
      <div class="pane-header">
        <span>Preview</span>
      </div>
      <div class="preview-scroll" id="preview-scroll">
        <div id="preview" class="markdown-body"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/mhchem.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
